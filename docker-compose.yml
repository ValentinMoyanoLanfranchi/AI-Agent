
services:
  # ─────────────────────────────────────────────
  # PostgreSQL + PostGIS
  # ─────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: hackaton_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackaton}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackaton_pass}
      POSTGRES_DB: ${POSTGRES_DB:-hackaton_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackaton}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # Redis (caché + pub/sub inter-agente)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: hackaton_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackaton_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # ─────────────────────────────────────────────
  # Celery Worker (ingesta ETL)
  # ─────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackaton_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A ingestion.tasks worker --loglevel=info --concurrency=4

  # ─────────────────────────────────────────────
  # Celery Beat (scheduler CRON)
  # ─────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackaton_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A ingestion.tasks beat --loglevel=info

  # ─────────────────────────────────────────────
  # Frontend React (Vite)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hackaton_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  postgres_data:
  redis_data:
